name: Stepik daily stats

on:
  schedule:
    # Каждый день в 06:00 (внимание: время в UTC)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-stepik-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # если зависимостей нет, этот шаг можно удалить
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Stepik daily stats script
        run: |
          python stepik_courses_daily_stats.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stepik-courses-daily
          path: stepik_courses_daily.csv
